# pydoc-markdown.yml
loaders:
  - type: python
    # Where to search for Python packages/modules
    search_path:
      - ./../src
    # Packages (directories with __init__.py) to document
    packages:
      - tableio_cfg_json

processors:
  - type: filter
    # Optional: skip private members, etc.
    expression: >
      (not name.startswith('_') or name in ('__init__', '__call__')) and
      default()
    skip_empty_modules: true
    exclude_private: true
  - type: smart
  - type: crossref

renderer:
  type: markdown
  filename: ./doc/api.md
